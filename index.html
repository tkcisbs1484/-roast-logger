<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>RM500 v22 No Table</title>

<style>
body{margin:0;background:#f5f5f5;font-family:Arial}
.card{background:#fff;margin:10px;padding:12px;border-radius:10px}
button{padding:10px;margin:3px;border-radius:6px;border:0;background:#222;color:#fff}
input{padding:8px;margin:3px;width:80px}
#time{font-size:42px;text-align:center}
svg{width:100%;height:420px;background:#fff;border:1px solid #ddd;border-radius:10px}
</style>
</head>

<body>

<div class="card">
<div id="time">00:00</div>
<button onclick="start()">Start</button>
<button onclick="pause()">Pause</button>
<button onclick="reset()">Reset</button>
<button onclick="shift(-10)">-10s</button>
<button onclick="shift(10)">+10s</button>
</div>

<div class="card">
BT <input id="bt">
Power <input id="pw">
Fan <input id="fan">
<button onclick="save()">Save</button>
</div>

<div class="card">
<button onclick="eventSave('Charge')">Charge</button>
<button onclick="eventSave('Bottom')">Bottom</button>
<button onclick="eventSave('GC')">GC</button>
<button onclick="eventSave('FC')">1st Crack</button>
<button onclick="eventSave('Drop')">Drop</button>
</div>

<svg id="g" viewBox="0 0 760 420"></svg>

<script>
let rows=[],events={},run=false,startT=0,base=0;

function now(){return run?base+Math.floor((Date.now()-startT)/1000):base}
function fmt(s){
let m=Math.floor(s/60),sec=s%60;
return String(m).padStart(2,'0')+":"+String(sec).padStart(2,'0')
}

function start(){if(run)return;run=true;startT=Date.now();loop()}
function pause(){base=now();run=false}
function reset(){base=0;run=false;rows=[];events={};draw()}

function shift(d){base=Math.max(0,now()+d);startT=Date.now()}

function loop(){
time.innerText=fmt(now());
draw();
if(run)requestAnimationFrame(loop);
}

function save(){
let t=now();
let bt=parseFloat(btEl.value);
let pw=parseFloat(pwEl.value);
let fan=parseFloat(fanEl.value);
if(isNaN(bt)&&isNaN(pw)&&isNaN(fan))return;
rows.push({t,bt,pw,fan});
rows.sort((a,b)=>a.t-b.t);
btEl.value="";pwEl.value="";fanEl.value="";
}

function eventSave(name){
events[name]=now();
}

const btEl=document.getElementById("bt");
const pwEl=document.getElementById("pw");
const fanEl=document.getElementById("fan");
const time=document.getElementById("time");

function ror(i){
if(i<1)return null;
let a=rows[i],b=rows[i-1];
if(isNaN(a.bt)||isNaN(b.bt))return null;
let dt=(a.t-b.t)/60;
if(dt<=0)return null;
return (a.bt-b.bt)/dt;
}

function smooth(i){
let vals=[];
for(let j=i-1;j<=i+1;j++){
if(j>=0&&j<rows.length){
let r=ror(j);
if(r!==null)vals.push(r);
}}
if(!vals.length)return null;
return vals.reduce((a,b)=>a+b,0)/vals.length;
}

function draw(){
let svg=document.getElementById("g");

let maxT=14*60;
let maxTemp=230;

let x=t=>t/maxT*760;
let y=v=>420-(v/maxTemp*420);

let html='';


// ===== BT LINE =====
let btPts=rows.filter(r=>!isNaN(r.bt));
if(btPts.length){
let d='';
btPts.forEach((p,i)=>{
d+=(i?'L':'M')+x(p.t)+' '+y(p.bt)+' ';
});
html+=`<path d="${d}" stroke="#000" fill="none" stroke-width="3"/>`;

btPts.forEach(p=>{
html+=`<circle cx="${x(p.t)}" cy="${y(p.bt)}" r="4" fill="#000"/>`;
html+=`<text x="${x(p.t)+5}" y="${y(p.bt)-5}" font-size="12">${Math.round(p.bt)}</text>`;
});
}

// ===== ROR =====
let rorPts=[];
rows.forEach((r,i)=>{
let val=smooth(i);
if(val!==null)rorPts.push([r.t,val]);
});
if(rorPts.length){
let d='';
rorPts.forEach((p,i)=>{
d+=(i?'L':'M')+x(p[0])+' '+y(p[1]*5)+' ';
});
html+=`<path d="${d}" stroke="#777" stroke-dasharray="5 5" fill="none"/>`;
}

// ===== EVENTS =====
Object.keys(events).forEach(name=>{
let t=events[name];
let xx=x(t);
html+=`<line x1="${xx}" y1="0" x2="${xx}" y2="420" stroke="#b36b00"/>`;
html+=`<text transform="translate(${xx+4},20) rotate(90)" font-size="12">${name}</text>`;
});

svg.innerHTML=html;
}
draw();
</script>

</body>
</html>
