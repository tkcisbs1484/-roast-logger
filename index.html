<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>RM500 TEST</title>
<style>
body{font-family:Arial;background:#f5f5f5}
.card{background:white;margin:10px;padding:12px;border-radius:10px}
button{padding:10px;background:#222;color:white;border:0;border-radius:6px}
input{padding:8px;width:80px}
canvas{width:100%;height:420px;border:2px solid #000;background:white}
#time{font-size:40px;text-align:center}
</style>
</head>
<body>

<div class="card">
<div id="time">00:00</div>
<button onclick="start()">Start</button>
<button onclick="pause()">Pause</button>
<button onclick="reset()">Reset</button>
</div>

<div class="card">
BT <input id="bt">
<button onclick="save()">Save</button>
</div>

<canvas id="c" width="900" height="420"></canvas>

<script>
let data=[],run=false,startT=0,base=0;
const timeEl=document.getElementById("time");
const btEl=document.getElementById("bt");

function now(){return run?base+Math.floor((Date.now()-startT)/1000):base}
function fmt(s){let m=Math.floor(s/60),sec=s%60;return m+":"+String(sec).padStart(2,"0")}

function start(){if(run)return;run=true;startT=Date.now();loop()}
function pause(){base=now();run=false}
function reset(){base=0;run=false;data=[];timeEl.innerText="00:00";draw()}

function loop(){
timeEl.innerText=fmt(now());
draw();
if(run)requestAnimationFrame(loop);
}

function save(){
let bt=parseFloat(btEl.value);
if(isNaN(bt))return;
data.push({t:now(),bt:bt});
btEl.value="";
draw();
}

function draw(){
let c=document.getElementById("c");
let ctx=c.getContext("2d");
ctx.clearRect(0,0,c.width,c.height);

let L=60,T=20,W=800,H=360;

// background
ctx.fillStyle="white";
ctx.fillRect(0,0,c.width,c.height);

// grid + numbers
ctx.strokeStyle="#ddd";
ctx.fillStyle="#000";
ctx.font="16px Arial";

for(let temp=0;temp<=230;temp+=10){
let y=T+H-(temp/230)*H;
ctx.beginPath();
ctx.moveTo(L,y);
ctx.lineTo(L+W,y);
ctx.stroke();
ctx.fillText(temp+"C",8,y+5);
}

for(let m=0;m<=14;m++){
let x=L+(m/14)*W;
ctx.beginPath();
ctx.moveTo(x,T);
ctx.lineTo(x,T+H);
ctx.stroke();
ctx.fillText(m+"m",x-8,T+H+25);
}

// axis
ctx.strokeStyle="#000";
ctx.lineWidth=2;
ctx.beginPath();
ctx.moveTo(L,T);
ctx.lineTo(L,T+H);
ctx.lineTo(L+W,T+H);
ctx.stroke();

// sample text
ctx.fillText("GRAPH AREA OK",L+20,T+25);

// data line
if(data.length<1)return;

ctx.strokeStyle="red";
ctx.lineWidth=3;
ctx.beginPath();

data.forEach((d,i)=>{
let x=L+(d.t/(14*60))*W;
let y=T+H-(d.bt/230)*H;
if(i===0)ctx.moveTo(x,y);
else ctx.lineTo(x,y);
});

ctx.stroke();

data.forEach(d=>{
let x=L+(d.t/(14*60))*W;
let y=T+H-(d.bt/230)*H;
ctx.fillStyle="red";
ctx.beginPath();
ctx.arc(x,y,5,0,Math.PI*2);
ctx.fill();
ctx.fillStyle="#000";
ctx.fillText(d.bt+"C",x+6,y-8);
});
}

draw();
</script>
</body>
</html>
